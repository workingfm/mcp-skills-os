services:
  skill-os:
    build: .
    image: skill-os:2.0
    container_name: skill-os

    volumes:
      # Monta l'intero progetto: git, skills e log vivono sul tuo disco
      # hot-reload e git commit funzionano senza restart
      - .:/app

      # Socket Docker: necessario per lanciare i container sandbox
      # (commenta questa riga se vuoi usare SKILL_OS_SANDBOX=mock)
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      # "docker" = sandbox Docker reale (richiede socket montato)
      # "mock"   = subprocess locale, nessun isolamento (solo dev)
      SKILL_OS_SANDBOX: ${SKILL_OS_SANDBOX:-mock}

      # "true" = orchestratore autonomo attivo (ogni 30 min)
      # "false" = solo su richiesta manuale
      ORCHESTRATOR_ENABLED: ${ORCHESTRATOR_ENABLED:-false}
      ORCHESTRATOR_INTERVAL: ${ORCHESTRATOR_INTERVAL:-1800}

      # NON serve ANTHROPIC_API_KEY: il ragionamento LLM passa
      # attraverso MCP sampling → abbonamento Claude Pro

      # Auto-approvazione skill sicure (no side_effects, idempotent)
      AUTO_APPROVE_SAFE: ${AUTO_APPROVE_SAFE:-false}
      AUTO_APPROVE_MIN_SCORE: ${AUTO_APPROVE_MIN_SCORE:-7.0}

      # Timeout attesa approvazione upsert (secondi)
      APPROVAL_TIMEOUT_SECONDS: ${APPROVAL_TIMEOUT_SECONDS:-300}

      # ASR — Adaptive Skill Reinforcement
      ASR_ENABLED: ${ASR_ENABLED:-true}
      ASR_MAX_RETRIES: ${ASR_MAX_RETRIES:-1}
      ASR_MAX_MUTATIONS_PER_DAY: ${ASR_MAX_MUTATIONS_PER_DAY:-5}
      ASR_STABILITY_THRESHOLD: ${ASR_STABILITY_THRESHOLD:-10}
      ASR_DEGRADED_AFTER_ROLLBACKS: ${ASR_DEGRADED_AFTER_ROLLBACKS:-3}
      ASR_FITNESS_ALPHA: ${ASR_FITNESS_ALPHA:-0.3}
      ASR_MAX_EPISODES: ${ASR_MAX_EPISODES:-200}
      ASR_MAX_SNAPSHOTS: ${ASR_MAX_SNAPSHOTS:-20}
      ASR_COOLDOWN_SECONDS: ${ASR_COOLDOWN_SECONDS:-300}

    # stdin_open + tty: necessari per il transport stdio MCP (Claude Code)
    stdin_open: true
    tty: false

    restart: "no"   # Claude Code lancia/termina il container ad ogni sessione
